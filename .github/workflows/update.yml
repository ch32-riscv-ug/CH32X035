name: update

on:
  schedule:
    # Daily 18:37 UTC (02:37 CST China / 03:37 JST) - China late-night.
    # GitHub may delay runs by hours; scheduled early so it stays before
    # China's heavy morning hours.
    - cron: '37 18 * * *'
  workflow_dispatch:

# Write permission is required to commit/push updated files.
permissions:
  contents: write

# Do not run overlapping updates.
concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # update.sh only downloads and extracts. It exits non-zero on a failed
      # download (e.g. a changed URL), failing the job without overwriting
      # good files.
      - name: Download datasheets / EVT
        run: |
          chmod +x ./update.sh
          ./update.sh

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "update (automated)"
            git push
          fi

      # Keep the daily schedule from being auto-disabled after 60 days of
      # repository inactivity: if the latest commit is older than 50 days, push
      # one empty commit. Built-in GITHUB_TOKEN only (contents: write); no PAT,
      # no third-party action.
      - name: Keepalive (avoid 60-day schedule auto-disable)
        run: |
          age_days=$(( ( $(date +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          echo "Last commit age: ${age_days} day(s)"
          if [ "$age_days" -ge 50 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "keepalive: prevent scheduled workflow auto-disable"
            git push
          else
            echo "Recent activity exists; no keepalive commit needed."
          fi
